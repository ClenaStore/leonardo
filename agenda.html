<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Importar Agenda de Recebimentos</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#0b0b0b;
  color:#fff;
  font-family:Inter
}
.card{
  background:#151515;
  border:1px solid #242424;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px
}
input,button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #242424;
  background:#0b0b0b;
  color:#fff
}
button{
  background:#d4af37;
  color:#000;
  font-weight:800;
  cursor:pointer
}
.preview{
  font-size:13px;
  color:#cbd5f5;
}
.empresa{
  margin-top:12px;
  border-top:1px dashed #333;
  padding-top:10px;
}
.dia{
  margin-top:8px;
  padding:8px;
  background:#111;
  border-radius:10px;
}
.bandeira{
  margin-left:10px;
  font-size:12px;
}
.success{color:#22c55e}
.error{color:#ef4444}
</style>
</head>

<body>

<div class="card">
  <h2>Importar Agenda de Recebimentos</h2>

  <input type="file" id="file" accept=".xlsx" multiple><br><br>

  <button onclick="processar()">Processar Arquivos</button>
</div>

<div class="card">
  <h3>Pré-visualização</h3>
  <div id="preview">Nenhum dado</div>
</div>

<div class="card">
  <button onclick="salvar()">Salvar no Supabase</button>
  <div id="msg"></div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);


let registros = [];

/* ================= CORREÇÃO DATA ================= */

function excelDateToISO(excelDate){

  if(typeof excelDate === "number"){
    const utc_days = Math.floor(excelDate - 25569);
    const utc_value = utc_days * 86400;
    const date = new Date(utc_value * 1000);
    return date.toISOString().split("T")[0];
  }

  if(typeof excelDate === "string"){
    const d = new Date(excelDate);
    if(!isNaN(d)) return d.toISOString().split("T")[0];
  }

  return null;
}

/* ================= PROCESSAR ================= */

async function processar(){

  const files = document.getElementById("file").files;

  if(!files.length){
    alert("Selecione arquivos");
    return;
  }

  registros = [];
  const preview = document.getElementById("preview");
  preview.innerHTML = "";

  for(const file of files){
    await lerArquivo(file, preview);
  }
}

/* ================= LER ================= */

function lerArquivo(file, preview){

  return new Promise(resolve=>{

    const reader = new FileReader();

    reader.onload = e=>{

      const wb = XLSX.read(e.target.result,{type:"binary"});
      const ws = wb.Sheets["pagamentos futuros"];

      const rows = XLSX.utils.sheet_to_json(ws,{header:1});

      const mapa = {};

      rows.slice(2).forEach(l=>{

        const dataRaw = l[0];
        const dataISO = excelDateToISO(dataRaw);

        const empresa = l[1];
        const banco = l[4];
        const agencia = l[5];
        const conta = l[6];
        const bandeira = l[11] || "OUTROS";
        const modalidade = l[12];
        const valor = Number(l[13]);
        const status = l[14];

        if(!dataISO || !empresa || !valor) return;

        registros.push({
          data_recebimento: dataISO,
          empresa: empresa.toUpperCase(),
          bandeira,
          modalidade,
          valor,
          status,
          banco,
          agencia,
          conta,
          origem: "IMPORTACAO_EXCEL",
          arquivo_origem: file.name
        });

        const key = `${empresa}|${dataISO}|${bandeira}`;
        mapa[key] = (mapa[key] || 0) + valor;

      });

      /* ORGANIZA */
      const estrutura = {};

      Object.entries(mapa).forEach(([k,v])=>{

        const [empresa,data,bandeira] = k.split("|");

        if(!estrutura[empresa]) estrutura[empresa] = {};
        if(!estrutura[empresa][data]) estrutura[empresa][data] = {};

        estrutura[empresa][data][bandeira] =
          (estrutura[empresa][data][bandeira] || 0) + v;

      });

      /* PREVIEW */
      preview.innerHTML += `
        <div style="margin-bottom:16px">
          <strong>${file.name}</strong>

          ${Object.entries(estrutura).map(([empresa,dias])=>`
            <div class="empresa">
              <strong style="color:#d4af37">${empresa}</strong>

              ${Object.entries(dias).map(([data,bands])=>`
                <div class="dia">
                  <strong>${data}</strong>

                  ${Object.entries(bands).map(([b,v])=>`
                    <div class="bandeira">
                      • ${b}: R$ ${v.toFixed(2)}
                    </div>
                  `).join("")}

                </div>
              `).join("")}

            </div>
          `).join("")}

        </div>
      `;

      resolve();
    };

    reader.readAsBinaryString(file);

  });
}

/* ================= SALVAR ================= */

async function salvar(){

  if(!registros.length){
    alert("Nada para salvar");
    return;
  }

  const { error } = await sb
    .from("agenda_recebimentos")
    .insert(registros);

  document.getElementById("msg").innerHTML = error
    ? `<div class="error">Erro ao salvar</div>`
    : `<div class="success">Importado com sucesso</div>`;
}

</script>

</body>
</html>
