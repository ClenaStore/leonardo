<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Importar Agenda de Recebimentos</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  padding:20px;
  background:#0b0b0b;
  color:#fff;
  font-family:Inter
}
.card{
  background:#151515;
  border:1px solid #242424;
  border-radius:18px;
  padding:16px;
  margin-bottom:16px
}
input,button{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #242424;
  background:#0b0b0b;
  color:#fff
}
button{
  background:#d4af37;
  color:#000;
  font-weight:800;
  cursor:pointer
}
.preview{
  font-size:13px;
  color:#cbd5f5;
}
.success{color:#22c55e}
.error{color:#ef4444}
</style>
</head>

<body>

<div class="card">
  <h2>Importar Agenda de Recebimentos</h2>

  <input type="file" id="file" accept=".xlsx"><br><br>

  <button onclick="processar()">Processar</button>
</div>

<div class="card">
  <h3>Pré-visualização</h3>
  <div id="preview">Nenhum dado</div>
</div>

<div class="card">
  <button onclick="salvar()">Salvar no Supabase</button>
  <div id="msg"></div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let registros = [];

/* PROCESSAR EXCEL */

async function processar(){
  const file = document.getElementById("file").files[0];

  if(!file){
    alert("Selecione o arquivo");
    return;
  }

  registros = [];

  const reader = new FileReader();

  reader.onload = e=>{
    const wb = XLSX.read(e.target.result,{type:"binary"});
    const ws = wb.Sheets["pagamentos futuros"];

    const rows = XLSX.utils.sheet_to_json(ws,{header:1});

    const preview = document.getElementById("preview");
    preview.innerHTML = "";

    const resumo = {};

    rows.slice(2).forEach(l=>{

      const data = l[0];
      const empresa = l[1];
      const banco = l[4];
      const agencia = l[5];
      const conta = l[6];
      const bandeira = l[11];
      const modalidade = l[12];
      const valor = Number(l[13]);
      const status = l[14];

      if(!data || !empresa || !valor) return;

      const dataISO = new Date(data).toISOString().split("T")[0];

      registros.push({
        data_recebimento: dataISO,
        empresa: empresa.toUpperCase(),
        bandeira,
        modalidade,
        valor,
        status,
        banco,
        agencia,
        conta,
        origem: "IMPORTACAO_EXCEL",
        arquivo_origem: file.name
      });

      /* RESUMO POR EMPRESA */
      if(!resumo[empresa]){
        resumo[empresa] = 0;
      }
      resumo[empresa] += valor;

    });

    /* PREVIEW */
    Object.entries(resumo).forEach(([emp,total])=>{
      preview.innerHTML += `
        <div style="margin-bottom:10px">
          <strong style="color:#d4af37">${emp}</strong><br>
          Total: R$ ${total.toFixed(2)}
        </div>
      `;
    });

  };

  reader.readAsBinaryString(file);
}

/* SALVAR */

async function salvar(){

  if(!registros.length){
    alert("Nada para salvar");
    return;
  }

  const { error } = await sb
    .from("agenda_recebimentos")
    .insert(registros);

  document.getElementById("msg").innerHTML = error
    ? `<div class="error">Erro ao salvar</div>`
    : `<div class="success">Importado com sucesso</div>`;
}

</script>

</body>
</html>
