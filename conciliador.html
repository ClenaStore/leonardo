<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Conciliador PIX</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>

*{
box-sizing:border-box;
font-family:Inter;
}

body{
margin:0;
background:#f1f5f9;
}

header{
background:#111827;
color:white;
padding:20px;
font-size:22px;
font-weight:800;
}

.container{
max-width:1400px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

button{
background:#111827;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
font-weight:700;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.indicador{
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 6px 20px rgba(0,0,0,0.05);
}

.indicador span{
font-size:13px;
color:#6b7280;
}

.indicador strong{
display:block;
font-size:26px;
margin-top:8px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th{
background:#f9fafb;
padding:12px;
text-align:left;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.ok{
color:#16a34a;
font-weight:700;
}

.erro{
color:#dc2626;
font-weight:700;
}

</style>

</head>

<body>

<header>
Conciliador Financeiro PIX
</header>

<div class="container">

<div class="card">

<h2>Importar Arquivos</h2>

<label>Relatório de Cupons</label>
<br>
<input type="file" id="cupons">

<br><br>

<label>Relatório PIX Rede</label>
<br>
<input type="file" id="pix">

<br><br>

<label>Extrato Bancário</label>
<br>
<input type="file" id="banco">

<br><br>

<button onclick="conciliar()">Conciliar</button>

</div>

<div class="grid">

<div class="indicador">
<span>Total vendas PIX</span>
<strong id="totalPix">R$ 0</strong>
</div>

<div class="indicador">
<span>Total encontrado no banco</span>
<strong id="totalBanco">R$ 0</strong>
</div>

<div class="indicador">
<span>Diferença</span>
<strong id="diferenca">R$ 0</strong>
</div>

<div class="indicador">
<span>Taxa conciliação</span>
<strong id="taxa">0%</strong>
</div>

</div>

<div class="card">

<h2>Resultado da Conciliação</h2>

<table>

<thead>

<tr>
<th>Venda PIX</th>
<th>Valor encontrado</th>
<th>Arquivo</th>
<th>Linha</th>
<th>Status</th>
</tr>

</thead>

<tbody id="resultado"></tbody>

</table>

</div>

</div>

<script>

let vendas=[]
let pix=[]
let banco=[]

function moeda(v){

return v.toLocaleString("pt-BR",{
style:"currency",
currency:"BRL"
})

}

// FUNÇÃO SEGURA PARA VALOR
function parseValor(v){

if(v === undefined || v === null || v === "") return null

// Excel já entrega número correto
if(typeof v === "number"){
return Number(v)
}

let txt = String(v).trim()

txt = txt.replace("R$","").trim()

// se for formato brasileiro
if(txt.includes(",")){
txt = txt.replace(/\./g,"")
txt = txt.replace(",",".")
}

let num = parseFloat(txt)

if(isNaN(num)) return null

return num

}

function lerArquivo(file,callback){

const reader=new FileReader()

reader.onload=function(e){

const data=new Uint8Array(e.target.result)

const workbook=XLSX.read(data,{type:"array"})

const sheet=workbook.Sheets[workbook.SheetNames[0]]

const json=XLSX.utils.sheet_to_json(sheet,{header:1})

callback(json)

}

reader.readAsArrayBuffer(file)

}

document.getElementById("cupons").addEventListener("change",function(){

lerArquivo(this.files[0],dados=>{

vendas=[]

const header=dados[0]

const coluna=header.findIndex(c=>String(c).toLowerCase().includes("liquido"))

for(let i=1;i<dados.length;i++){

let valor=parseValor(dados[i][coluna])

if(valor!==null){

vendas.push({
valor:valor,
linha:i+1
})

}

}

})

})

document.getElementById("pix").addEventListener("change",function(){

lerArquivo(this.files[0],dados=>{

pix=[]

dados.forEach((linha,i)=>{

linha.forEach(col=>{

let v=parseValor(col)

if(v!==null){

pix.push({
valor:v,
linha:i+1
})

}

})

})

})

})

document.getElementById("banco").addEventListener("change",function(){

lerArquivo(this.files[0],dados=>{

banco=[]

dados.forEach((linha,i)=>{

linha.forEach(col=>{

let v=parseValor(col)

if(v!==null){

banco.push({
valor:v,
linha:i+1
})

}

})

})

})

})

function conciliar(){

let totalPix=0
let totalBanco=0
let conciliadas=0

const tbody=document.getElementById("resultado")
tbody.innerHTML=""

vendas.forEach(v=>{

totalPix+=v.valor

let encontrado=null

let p=pix.find(x=>Math.abs(x.valor-v.valor)<0.01)

let b=banco.find(x=>Math.abs(x.valor-v.valor)<0.01)

if(p){

encontrado={
valor:p.valor,
arquivo:"PIX REDE",
linha:p.linha
}

}

else if(b){

encontrado={
valor:b.valor,
arquivo:"EXTRATO",
linha:b.linha
}

}

let tr=document.createElement("tr")

if(encontrado){

conciliadas++
totalBanco+=encontrado.valor

tr.innerHTML=`
<td>${moeda(v.valor)}</td>
<td>${moeda(encontrado.valor)}</td>
<td>${encontrado.arquivo}</td>
<td>${encontrado.linha}</td>
<td class="ok">OK</td>
`

}

else{

tr.innerHTML=`
<td>${moeda(v.valor)}</td>
<td>-</td>
<td>-</td>
<td>-</td>
<td class="erro">NÃO ENCONTRADO</td>
`

}

tbody.appendChild(tr)

})

let taxa=((conciliadas/vendas.length)*100).toFixed(2)

document.getElementById("totalPix").innerText=moeda(totalPix)
document.getElementById("totalBanco").innerText=moeda(totalBanco)
document.getElementById("diferenca").innerText=moeda(totalPix-totalBanco)
document.getElementById("taxa").innerText=taxa+"%"

}

</script>

</body>
</html>
