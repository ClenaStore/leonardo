<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda Financeira • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;

--green:#16a34a;
--blue:#2563eb;

--shadow:0 12px 40px rgba(0,0,0,.06);
--radius:18px;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
padding:20px;
color:var(--text);
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
margin-bottom:24px;
}

/* RESUMO */
.resumo{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
margin-bottom:24px;
}

@media(max-width:900px){
.resumo{grid-template-columns:1fr}
}

.card{
background:var(--card);
padding:20px;
border-radius:20px;
box-shadow:var(--shadow);
transition:.2s;
}

.card:hover{
transform:translateY(-3px);
}

.card small{
color:var(--muted);
font-weight:500;
}

.card h2{
margin:8px 0 0;
color:var(--green);
font-size:22px;
}

/* FILTRO */
select{
padding:12px;
border-radius:12px;
border:1px solid var(--border);
font-weight:600;
}

/* CALENDÁRIOS */
.calendars{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
}

@media(max-width:900px){
.calendars{grid-template-columns:1fr}
}

.box{
background:var(--card);
padding:16px;
border-radius:20px;
box-shadow:var(--shadow);
}

/* TITULO */
.month-title{
font-weight:800;
margin-bottom:12px;
}

/* CALENDARIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.weekday{
font-size:12px;
text-align:center;
color:var(--muted);
font-weight:600;
}

/* DIA */
.day{
border:1px solid var(--border);
border-radius:14px;
padding:10px;
min-height:95px;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.2s;
background:#fff;
}

.day:hover{
border-color:var(--blue);
transform:translateY(-3px);
}

.day-number{
font-size:12px;
color:var(--muted);
}

.day-value{
font-size:14px;
font-weight:800;
color:var(--green);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
backdrop-filter:blur(6px);
}

.modal-box{
background:#fff;
padding:20px;
border-radius:22px;
width:95%;
max-width:420px;
box-shadow:0 25px 70px rgba(0,0,0,.25);
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0; transform:scale(.95)}
to{opacity:1; transform:scale(1)}
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.total{
font-size:22px;
font-weight:800;
color:var(--green);
margin-bottom:12px;
}

.item{
padding:10px 0;
border-bottom:1px solid var(--border);
}

.empty{
text-align:center;
color:var(--muted);
padding:20px;
}

.close{
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h2>💰 Agenda Financeira</h2>

<select id="empresaFiltro" onchange="carregar()">
<option value="">Todas Empresas</option>
</select>
</div>

<!-- RESUMO -->
<div class="resumo">

<div class="card">
<small>Hoje</small>
<h2 id="resHoje"></h2>
</div>

<div class="card">
<small>Mês Atual</small>
<h2 id="resMes"></h2>
</div>

<div class="card">
<small>Total Geral</small>
<h2 id="resTotal"></h2>
</div>

</div>

<!-- CALENDÁRIOS -->
<div class="calendars">

<div class="box">
<div id="mesAtual" class="month-title"></div>
<div id="calAtual" class="calendar"></div>
</div>

<div class="box">
<div id="mesProx" class="month-title"></div>
<div id="calProx" class="calendar"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">

<div class="modal-header">
<h3 id="modalData"></h3>
<span class="close" onclick="fecharModal()">✕</span>
</div>

<div id="modalTotal" class="total"></div>
<div id="modalConteudo"></div>

</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados = [];

/* ===== DATA ===== */
function getParts(dateStr){
  const [ano,mes,dia] = dateStr.split("-");
  return { ano:+ano, mes:+mes-1, dia:+dia };
}

function formatBR(dateStr){
  const [ano,mes,dia] = dateStr.split("-");
  return `${dia}/${mes}/${ano}`;
}

function moeda(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* ===== CARREGAR ===== */
async function carregar(){

  const empresa = document.getElementById("empresaFiltro").value;

  let query = sb.from("agenda_recebimentos").select("*");

  if(empresa){
    query = query.eq("empresa",empresa);
  }

  const { data } = await query;

  dados = data || [];

  montarFiltro();
  montarResumo();
  montarCalendarios();
}

/* ===== FILTRO ===== */
function montarFiltro(){

  const select = document.getElementById("empresaFiltro");
  const atual = select.value;

  const empresas = [...new Set(dados.map(d=>d.empresa).filter(Boolean))];

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option ${e===atual?"selected":""}>${e}</option>`).join("");
}

/* ===== RESUMO ===== */
function montarResumo(){

  const hoje = new Date();
  const hojeStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;

  let hojeTotal = 0;
  let mesTotal = 0;
  let total = 0;

  dados.forEach(d=>{
    const p = getParts(d.data_recebimento);

    total += Number(d.valor);

    if(d.data_recebimento === hojeStr){
      hojeTotal += Number(d.valor);
    }

    if(p.mes === hoje.getMonth() && p.ano === hoje.getFullYear()){
      mesTotal += Number(d.valor);
    }
  });

  resHoje.innerText = moeda(hojeTotal);
  resMes.innerText = moeda(mesTotal);
  resTotal.innerText = moeda(total);
}

/* ===== CALENDÁRIOS ===== */
function montarCalendarios(){

  const hoje = new Date();

  montarCalendario(hoje.getFullYear(), hoje.getMonth(), "calAtual", "mesAtual");
  montarCalendario(hoje.getFullYear(), hoje.getMonth()+1, "calProx", "mesProx");
}

/* ===== CALENDARIO ===== */
function montarCalendario(ano, mes, el, label){

  const container = document.getElementById(el);
  container.innerHTML = "";

  const ref = new Date(ano, mes, 1);

  document.getElementById(label).innerText =
    ref.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();

  const mapa = {};

  dados.forEach(d=>{
    const p = getParts(d.data_recebimento);

    if(p.ano !== ano || p.mes !== mes) return;

    mapa[p.dia] = (mapa[p.dia] || 0) + Number(d.valor);
  });

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  diasSemana.forEach(d=>{
    container.innerHTML += `<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<primeiroDia;i++){
    container.innerHTML += `<div></div>`;
  }

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    container.innerHTML += `
      <div class="day" onclick="abrirDia('${ano}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}')">
        <div class="day-number">${i}</div>
        <div class="day-value">${valor ? moeda(valor) : ""}</div>
      </div>
    `;
  }
}

/* ===== MODAL ===== */
function abrirDia(dataISO){

  const lista = dados.filter(d=> d.data_recebimento === dataISO);

  let total = 0;
  let html = "";

  lista.forEach(l=>{
    total += Number(l.valor);

    html += `
      <div class="item">
        <strong>${l.bandeira}</strong> - ${l.modalidade}<br>
        ${moeda(l.valor)}
      </div>
    `;
  });

  modalData.innerText = formatBR(dataISO);
  modalTotal.innerText = moeda(total);
  modalConteudo.innerHTML = html || `<div class="empty">Sem recebimentos</div>`;

  modal.style.display = "flex";
}

function fecharModal(){
  modal.style.display = "none";
}

/* INIT */
carregar();

</script>

</body>
</html>
