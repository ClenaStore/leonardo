<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda Financeira • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--green:#16a34a;
--blue:#2563eb;
--shadow:0 10px 30px rgba(0,0,0,.05);
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
padding:16px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

/* RESUMO */
.resumo{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-bottom:20px;
}

.card{
background:#fff;
padding:18px;
border-radius:20px;
box-shadow:var(--shadow);
}

.card small{
color:var(--muted);
}

.card h2{
color:var(--green);
margin:6px 0 0;
}

/* GRID */
.calendars{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

@media(max-width:900px){
.calendars{grid-template-columns:1fr}
}

/* BOX */
.box{
background:#fff;
padding:14px;
border-radius:20px;
box-shadow:var(--shadow);
}

/* CALENDARIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.weekday{
font-size:12px;
text-align:center;
color:var(--muted);
}

.day{
border:1px solid var(--border);
border-radius:14px;
padding:10px;
min-height:95px;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.day:hover{
border-color:var(--blue);
transform:translateY(-3px);
}

.day-value{
color:var(--green);
font-weight:800;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:20px;
width:95%;
max-width:420px;
}

.total{
font-size:20px;
font-weight:800;
color:var(--green);
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
<h2>💰 Agenda Financeira</h2>

<select id="empresaFiltro" onchange="carregar()">
<option value="">Todas Empresas</option>
</select>
</div>

<!-- RESUMO -->
<div class="resumo">
<div class="card">
<small>Hoje</small>
<h2 id="resHoje"></h2>
</div>

<div class="card">
<small>Mês Atual</small>
<h2 id="resMes"></h2>
</div>

<div class="card">
<small>Total Geral</small>
<h2 id="resTotal"></h2>
</div>
</div>

<!-- CALENDARIOS -->
<div class="calendars">

<div class="box">
<h3 id="mesAtual"></h3>
<div id="calAtual" class="calendar"></div>
</div>

<div class="box">
<h3 id="mesProx"></h3>
<div id="calProx" class="calendar"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalData"></h3>
<div id="modalTotal" class="total"></div>
<div id="modalConteudo"></div>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados = [];

/* 🔥 DATA SEM FUSO */
function getParts(dateStr){
  // formato YYYY-MM-DD
  const [ano,mes,dia] = dateStr.split("-");
  return {
    ano:Number(ano),
    mes:Number(mes)-1,
    dia:Number(dia)
  };
}

function moeda(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* CARREGAR */
async function carregar(){

  const empresa = document.getElementById("empresaFiltro").value;

  let query = sb.from("agenda_recebimentos").select("*");

  if(empresa){
    query = query.eq("empresa",empresa);
  }

  const { data } = await query;

  dados = data || [];

  montarFiltro();
  montarResumo();
  montarCalendarios();
}

/* FILTRO */
function montarFiltro(){

  const select = document.getElementById("empresaFiltro");
  const atual = select.value;

  const empresas = [...new Set(dados.map(d=>d.empresa).filter(Boolean))];

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option ${e===atual?"selected":""}>${e}</option>`).join("");
}

/* RESUMO */
function montarResumo(){

  const hoje = new Date();
  const hojeISO = hoje.toISOString().split("T")[0];

  let totalHoje = 0;
  let totalMes = 0;
  let totalGeral = 0;

  dados.forEach(d=>{

    const p = getParts(d.data_recebimento);

    totalGeral += Number(d.valor);

    if(d.data_recebimento === hojeISO){
      totalHoje += Number(d.valor);
    }

    if(p.mes === hoje.getMonth() && p.ano === hoje.getFullYear()){
      totalMes += Number(d.valor);
    }
  });

  resHoje.innerText = moeda(totalHoje);
  resMes.innerText = moeda(totalMes);
  resTotal.innerText = moeda(totalGeral);
}

/* CALENDARIOS */
function montarCalendarios(){

  const hoje = new Date();

  montarCalendario(hoje.getFullYear(), hoje.getMonth(), "calAtual", "mesAtual");
  montarCalendario(hoje.getFullYear(), hoje.getMonth()+1, "calProx", "mesProx");
}

/* CALENDARIO */
function montarCalendario(ano, mes, el, label){

  const container = document.getElementById(el);
  container.innerHTML = "";

  const ref = new Date(ano, mes, 1);

  document.getElementById(label).innerText =
    ref.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();

  const mapa = {};

  dados.forEach(d=>{

    const p = getParts(d.data_recebimento);

    if(p.ano !== ano || p.mes !== mes) return;

    mapa[p.dia] = (mapa[p.dia] || 0) + Number(d.valor);
  });

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  diasSemana.forEach(d=>{
    container.innerHTML += `<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<primeiroDia;i++){
    container.innerHTML += `<div></div>`;
  }

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    container.innerHTML += `
      <div class="day" onclick="abrirDia('${ano}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}')">
        <div>${i}</div>
        <div class="day-value">${valor ? moeda(valor) : ""}</div>
      </div>
    `;
  }
}

/* MODAL */
function abrirDia(dataISO){

  const lista = dados.filter(d=> d.data_recebimento === dataISO);

  let total = 0;
  let html = "";

  lista.forEach(l=>{
    total += Number(l.valor);

    html += `
      <div>
        <strong>${l.bandeira}</strong> - ${l.modalidade}<br>
        ${moeda(l.valor)}
      </div><br>
    `;
  });

  modalData.innerText = dataISO;
  modalTotal.innerText = moeda(total);
  modalConteudo.innerHTML = html || "Sem recebimentos";

  modal.style.display = "flex";
}

function fecharModal(){
  modal.style.display = "none";
}

/* INIT */
carregar();

</script>

</body>
</html>
