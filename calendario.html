<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda de Recebimentos • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;

--primary:#2563eb;
--green:#16a34a;

--shadow:0 6px 20px rgba(0,0,0,.06);
--radius:18px;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:16px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:14px;
}

h2{
margin:0;
font-weight:800;
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
}

select,button{
padding:10px 14px;
border-radius:12px;
border:1px solid var(--border);
background:#fff;
cursor:pointer;
font-weight:600;
transition:.2s;
}

select:hover,button:hover{
transform:translateY(-1px);
box-shadow:var(--shadow);
}

button{
background:var(--primary);
color:#fff;
}

/* MÊS */
#mesLabel{
margin:10px 0 16px;
font-weight:700;
color:var(--muted);
}

/* CALENDARIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.weekday{
text-align:center;
font-size:12px;
color:var(--muted);
font-weight:600;
}

/* DIA */
.day{
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:10px;
min-height:100px;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.2s;
box-shadow:var(--shadow);
}

.day:hover{
transform:translateY(-3px);
border-color:var(--primary);
}

.today{
border:2px solid var(--primary);
}

.day-number{
font-size:12px;
color:var(--muted);
font-weight:600;
}

.day-value{
font-size:15px;
font-weight:800;
color:var(--green);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:999;
backdrop-filter:blur(6px);
}

.modal-content{
background:#fff;
border-radius:20px;
padding:18px;
width:95%;
max-width:420px;
max-height:85vh;
overflow:auto;
box-shadow:0 20px 60px rgba(0,0,0,.2);
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0; transform:scale(.95)}
to{opacity:1; transform:scale(1)}
}

.modal-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.close{
cursor:pointer;
font-size:18px;
}

.total-dia{
font-size:20px;
font-weight:800;
color:var(--green);
margin-bottom:12px;
}

.item{
border-bottom:1px solid var(--border);
padding:10px 0;
font-size:14px;
}

.item strong{
font-weight:700;
}

.empty{
color:var(--muted);
text-align:center;
padding:20px;
}

</style>
</head>

<body>

<div class="header">
<h2>💰 Agenda de Recebimentos</h2>

<div class="controls">
<button onclick="mesAnterior()">←</button>
<button onclick="proximoMes()">→</button>

<select id="empresaFiltro" onchange="carregar()">
<option value="">Todas Empresas</option>
</select>
</div>
</div>

<h3 id="mesLabel"></h3>

<div id="calendar" class="calendar"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<div class="modal-header">
<h3 id="modalData"></h3>
<span class="close" onclick="fecharModal()">✕</span>
</div>

<div id="modalTotal" class="total-dia"></div>
<div id="modalConteudo"></div>

</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados = [];
let dataAtual = new Date();

/* ===== FORMATAÇÃO ===== */
function moeda(v){
  return Number(v).toLocaleString("pt-BR",{
    style:"currency",
    currency:"BRL"
  });
}

/* ===== CARREGAR ===== */
async function carregar(){

  const empresa = document.getElementById("empresaFiltro").value;

  let query = sb.from("agenda_recebimentos").select("*");

  if(empresa){
    query = query.eq("empresa",empresa);
  }

  const { data } = await query;

  dados = data || [];

  montarFiltro();
  montarCalendario();
}

/* ===== FILTRO ===== */
function montarFiltro(){

  const empresas = [...new Set(dados.map(d=>d.empresa).filter(Boolean))];

  const select = document.getElementById("empresaFiltro");

  const atual = select.value;

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option ${e===atual?"selected":""}>${e}</option>`).join("");
}

/* ===== CALENDARIO ===== */
function montarCalendario(){

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const ano = dataAtual.getFullYear();
  const mes = dataAtual.getMonth();

  document.getElementById("mesLabel").innerText =
    dataAtual.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();

  const mapa = {};

  dados.forEach(d=>{
    const dt = new Date(d.data_recebimento);
    if(dt.getMonth() !== mes) return;

    const dia = dt.getDate();
    mapa[dia] = (mapa[dia] || 0) + Number(d.valor);
  });

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d=>{
    calendar.innerHTML += `<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<primeiroDia;i++){
    calendar.innerHTML += `<div></div>`;
  }

  const hoje = new Date();

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    const isHoje =
      i === hoje.getDate() &&
      mes === hoje.getMonth() &&
      ano === hoje.getFullYear();

    calendar.innerHTML += `
      <div class="day ${isHoje ? "today":""}" onclick="abrirDia(${i})">
        <div class="day-number">${i}</div>
        <div class="day-value">
          ${valor ? moeda(valor) : ""}
        </div>
      </div>
    `;
  }
}

/* ===== MODAL ===== */
function abrirDia(dia){

  const ano = dataAtual.getFullYear();
  const mes = dataAtual.getMonth();

  const dataISO = new Date(ano, mes, dia)
    .toISOString()
    .split("T")[0];

  const lista = dados.filter(d=>d.data_recebimento === dataISO);

  let total = 0;
  const agrupado = {};

  lista.forEach(l=>{
    const key = `${l.bandeira} - ${l.modalidade}`;
    agrupado[key] = (agrupado[key] || 0) + Number(l.valor);
    total += Number(l.valor);
  });

  let html = "";

  Object.entries(agrupado).forEach(([k,v])=>{
    html += `
      <div class="item">
        <strong>${k}</strong><br>
        ${moeda(v)}
      </div>
    `;
  });

  document.getElementById("modalData").innerText = dataISO;
  document.getElementById("modalTotal").innerText = moeda(total);
  document.getElementById("modalConteudo").innerHTML =
    html || `<div class="empty">Sem recebimentos</div>`;

  document.getElementById("modal").style.display = "flex";
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== MÊS ===== */
function mesAnterior(){
  dataAtual.setMonth(dataAtual.getMonth()-1);
  montarCalendario();
}

function proximoMes(){
  dataAtual.setMonth(dataAtual.getMonth()+1);
  montarCalendario();
}

/* INIT */
carregar();

</script>

</body>
</html>
