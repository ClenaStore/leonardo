<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda de Recebimentos • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--primary:#2563eb;
--green:#16a34a;
--shadow:0 6px 20px rgba(0,0,0,.06);
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:16px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
flex-wrap:wrap;
}

.controls{
display:flex;
gap:10px;
}

select{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
}

/* GRID */
.calendars{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

@media(max-width:900px){
.calendars{grid-template-columns:1fr}
}

/* BOX */
.box{
background:#fff;
border-radius:18px;
padding:14px;
box-shadow:var(--shadow);
}

/* CALENDAR */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.weekday{
text-align:center;
font-size:12px;
color:var(--muted);
}

.day{
border:1px solid var(--border);
border-radius:14px;
padding:10px;
min-height:90px;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.2s;
}

.day:hover{
transform:translateY(-3px);
border-color:var(--primary);
}

.day-value{
color:var(--green);
font-weight:800;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:20px;
width:95%;
max-width:400px;
}

.total{
font-size:20px;
font-weight:800;
color:var(--green);
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="header">
<h2>💰 Agenda de Recebimentos</h2>

<div class="controls">
<select id="empresaFiltro" onchange="carregar()">
<option value="">Todas Empresas</option>
</select>
</div>
</div>

<div class="calendars">

<div class="box">
<h3 id="mesAtual"></h3>
<div id="calAtual" class="calendar"></div>
</div>

<div class="box">
<h3 id="mesProximo"></h3>
<div id="calProx" class="calendar"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalData"></h3>
<div id="modalTotal" class="total"></div>
<div id="modalConteudo"></div>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados = [];

/* ===== FORMATAR DATA LOCAL ===== */
function formatISO(date){
  const d = new Date(date);
  return d.getFullYear() + "-" +
    String(d.getMonth()+1).padStart(2,"0") + "-" +
    String(d.getDate()).padStart(2,"0");
}

/* ===== MOEDA ===== */
function moeda(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* ===== CARREGAR ===== */
async function carregar(){

  const empresa = document.getElementById("empresaFiltro").value;

  let query = sb.from("agenda_recebimentos").select("*");

  if(empresa){
    query = query.eq("empresa",empresa);
  }

  const { data } = await query;

  dados = data || [];

  montarFiltro();
  montarTudo();
}

/* ===== FILTRO ===== */
function montarFiltro(){

  const select = document.getElementById("empresaFiltro");

  const atual = select.value;

  const empresas = [...new Set(dados.map(d=>d.empresa).filter(Boolean))];

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option ${e===atual?"selected":""}>${e}</option>`).join("");
}

/* ===== MONTAR TUDO ===== */
function montarTudo(){

  const hoje = new Date();

  montarCalendario(
    hoje.getFullYear(),
    hoje.getMonth(),
    "calAtual",
    "mesAtual"
  );

  montarCalendario(
    hoje.getFullYear(),
    hoje.getMonth()+1,
    "calProx",
    "mesProximo"
  );
}

/* ===== CALENDARIO ===== */
function montarCalendario(ano, mes, el, label){

  const container = document.getElementById(el);
  container.innerHTML = "";

  const ref = new Date(ano, mes, 1);

  document.getElementById(label).innerText =
    ref.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();

  const mapa = {};

  dados.forEach(d=>{
    const dt = new Date(d.data_recebimento);

    if(dt.getFullYear() !== ano || dt.getMonth() !== mes) return;

    const dia = dt.getDate();
    mapa[dia] = (mapa[dia] || 0) + Number(d.valor);
  });

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  diasSemana.forEach(d=>{
    container.innerHTML += `<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<primeiroDia;i++){
    container.innerHTML += `<div></div>`;
  }

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    container.innerHTML += `
      <div class="day" onclick="abrirDia(${ano},${mes},${i})">
        <div>${i}</div>
        <div class="day-value">${valor ? moeda(valor) : ""}</div>
      </div>
    `;
  }
}

/* ===== MODAL ===== */
function abrirDia(ano, mes, dia){

  const dataISO = formatISO(new Date(ano,mes,dia));

  const lista = dados.filter(d=>{
    return formatISO(d.data_recebimento) === dataISO;
  });

  let total = 0;
  let html = "";

  lista.forEach(l=>{
    total += Number(l.valor);

    html += `
      <div>
        ${l.bandeira} - ${l.modalidade}<br>
        ${moeda(l.valor)}
      </div><br>
    `;
  });

  document.getElementById("modalData").innerText = dataISO;
  document.getElementById("modalTotal").innerText = moeda(total);
  document.getElementById("modalConteudo").innerHTML =
    html || "Sem recebimentos";

  document.getElementById("modal").style.display = "flex";
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
}

/* INIT */
carregar();

</script>

</body>
</html>
