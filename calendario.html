<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda Financeira • Mercatto</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#f8fafc;
--card:#ffffff;
--border:#e5e7eb;
--text:#0f172a;
--muted:#64748b;
--green:#16a34a;
--blue:#2563eb;
--shadow:0 12px 40px rgba(0,0,0,.06);
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
padding:20px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
}

/* RESUMO */
.resumo{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:16px;
margin-bottom:20px;
}

@media(max-width:900px){
.resumo{grid-template-columns:1fr}
}

.card{
background:#fff;
padding:18px;
border-radius:18px;
box-shadow:var(--shadow);
}

.card h2{
color:var(--green);
margin:5px 0;
}

/* SELECT */
select{
padding:12px;
border-radius:12px;
border:1px solid var(--border);
font-weight:600;
}

/* CALENDARIOS */
.calendars{
display:grid;
grid-template-columns:1fr 1fr;
gap:16px;
}

@media(max-width:900px){
.calendars{grid-template-columns:1fr}
}

.box{
background:#fff;
padding:16px;
border-radius:18px;
box-shadow:var(--shadow);
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.weekday{
font-size:12px;
text-align:center;
color:var(--muted);
}

.day{
border:1px solid var(--border);
border-radius:12px;
padding:10px;
min-height:90px;
cursor:pointer;
display:flex;
flex-direction:column;
justify-content:space-between;
transition:.2s;
}

.day:hover{
border-color:var(--blue);
transform:translateY(-2px);
}

.today{
border:2px solid var(--blue);
}

.day-value{
color:var(--green);
font-weight:800;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#fff;
padding:20px;
border-radius:18px;
width:95%;
max-width:420px;
max-height:80vh;
overflow:auto;
}

.total{
font-size:20px;
font-weight:800;
color:var(--green);
margin-bottom:10px;
}

/* LOADER */
.loader{
position:fixed;
inset:0;
background:rgba(255,255,255,.8);
display:flex;
align-items:center;
justify-content:center;
font-weight:700;
}

</style>
</head>

<body>

<div class="loader" id="loader">Carregando...</div>

<div class="header">
<h2>💰 Agenda Financeira</h2>

<select id="empresaFiltro" onchange="aplicarFiltro()">
<option value="">Todas Empresas</option>
</select>
</div>

<div class="resumo">
<div class="card"><small>Hoje</small><h2 id="resHoje"></h2></div>
<div class="card"><small>Mês Atual</small><h2 id="resMes"></h2></div>
<div class="card"><small>Total Geral</small><h2 id="resTotal"></h2></div>
</div>

<div class="calendars">
<div class="box">
<h3 id="mesAtual"></h3>
<div id="calAtual" class="calendar"></div>
</div>

<div class="box">
<h3 id="mesProx"></h3>
<div id="calProx" class="calendar"></div>
</div>
</div>

<div class="modal" id="modal">
<div class="modal-box">
<h3 id="modalData"></h3>
<div id="modalTotal" class="total"></div>
<div id="modalConteudo"></div>
<button onclick="fecharModal()">Fechar</button>
</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados = [];
let dadosFiltrados = [];

/* DATA */
function getParts(dateStr){
  const [a,m,d] = dateStr.split("-");
  return {ano:+a, mes:+m-1, dia:+d};
}

function formatBR(dateStr){
  const [a,m,d] = dateStr.split("-");
  return `${d}/${m}/${a}`;
}

function moeda(v){
  return Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

/* CARREGAR */
async function carregar(){

  const { data } = await sb.from("agenda_recebimentos").select("*");

  dados = data || [];

  montarFiltro();
  aplicarFiltro();

  loader.style.display = "none";
}

/* FILTRO */
function montarFiltro(){

  const select = document.getElementById("empresaFiltro");
  const atual = select.value;

  const empresas = [...new Set(dados.map(d=>d.empresa).filter(Boolean))];

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option ${e===atual?"selected":""}>${e}</option>`).join("");
}

function aplicarFiltro(){

  const empresa = empresaFiltro.value;

  dadosFiltrados = empresa
    ? dados.filter(d=>d.empresa === empresa)
    : [...dados];

  montarResumo();
  montarCalendarios();
}

/* RESUMO */
function montarResumo(){

  const hoje = new Date();
  const hojeStr = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}-${String(hoje.getDate()).padStart(2,'0')}`;

  let hojeTotal = 0;
  let mesTotal = 0;
  let total = 0;

  dadosFiltrados.forEach(d=>{
    const p = getParts(d.data_recebimento);

    total += Number(d.valor);

    if(d.data_recebimento === hojeStr){
      hojeTotal += Number(d.valor);
    }

    if(p.mes === hoje.getMonth() && p.ano === hoje.getFullYear()){
      mesTotal += Number(d.valor);
    }
  });

  resHoje.innerText = moeda(hojeTotal);
  resMes.innerText = moeda(mesTotal);
  resTotal.innerText = moeda(total);
}

/* CALENDARIOS */
function montarCalendarios(){

  const hoje = new Date();

  montarCalendario(hoje.getFullYear(), hoje.getMonth(), "calAtual", "mesAtual");
  montarCalendario(hoje.getFullYear(), hoje.getMonth()+1, "calProx", "mesProx");
}

function montarCalendario(ano, mes, el, label){

  const container = document.getElementById(el);
  container.innerHTML = "";

  const ref = new Date(ano, mes, 1);

  document.getElementById(label).innerText =
    ref.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();

  const mapa = {};

  dadosFiltrados.forEach(d=>{
    const p = getParts(d.data_recebimento);
    if(p.ano !== ano || p.mes !== mes) return;
    mapa[p.dia] = (mapa[p.dia] || 0) + Number(d.valor);
  });

  const hoje = new Date();

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

  diasSemana.forEach(d=>{
    container.innerHTML += `<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<primeiroDia;i++){
    container.innerHTML += `<div></div>`;
  }

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    const isHoje =
      i === hoje.getDate() &&
      mes === hoje.getMonth() &&
      ano === hoje.getFullYear();

    container.innerHTML += `
      <div class="day ${isHoje?'today':''}" onclick="abrirDia('${ano}-${String(mes+1).padStart(2,'0')}-${String(i).padStart(2,'0')}')">
        <div>${i}</div>
        <div class="day-value">${valor ? moeda(valor) : ""}</div>
      </div>
    `;
  }
}

/* MODAL */
function abrirDia(dataISO){

  const lista = dadosFiltrados.filter(d=> d.data_recebimento === dataISO);

  let total = 0;
  let html = "";

  lista.forEach(l=>{
    total += Number(l.valor);

    html += `
      <div>
        <strong>${l.bandeira}</strong> - ${l.modalidade}<br>
        ${moeda(l.valor)}
      </div><br>
    `;
  });

  modalData.innerText = formatBR(dataISO);
  modalTotal.innerText = moeda(total);
  modalConteudo.innerHTML = html || "Sem recebimentos";

  modal.style.display = "flex";
}

function fecharModal(){
  modal.style.display = "none";
}

/* INIT */
carregar();

</script>

</body>
</html>
