<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda de Recebimentos • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0b0b0b;
--card:#151515;
--border:#242424;
--text:#ffffff;
--muted:#9ca3af;
--gold:#d4af37;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:16px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
}

select{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:#fff;
}

/* CALENDARIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:8px;
min-height:90px;
cursor:pointer;
transition:.2s;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.day:hover{
transform:scale(1.04);
border-color:var(--gold);
}

.day-number{
font-size:12px;
color:var(--muted);
}

.day-value{
font-size:14px;
font-weight:800;
color:var(--gold);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-content{
background:var(--card);
padding:16px;
border-radius:18px;
width:95%;
max-width:420px;
}

.item{
border-bottom:1px solid #333;
padding:8px 0;
}

.close{
cursor:pointer;
float:right;
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
<h2>Agenda de Recebimentos</h2>

<select id="empresaFiltro" onchange="carregar()">
<option value="">Todas Empresas</option>
</select>
</div>

<div id="calendar" class="calendar"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="fecharModal()">✕</span>
<h3 id="modalData"></h3>
<div id="modalConteudo"></div>
</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);

let dados = [];

/* DATA ATUAL */
const hoje = new Date();
const ano = hoje.getFullYear();
const mes = hoje.getMonth();

/* ================= LOAD ================= */

async function carregar(){

  const empresa = document.getElementById("empresaFiltro").value;

  let query = sb
    .from("agenda_recebimentos")
    .select("*");

  if(empresa){
    query = query.eq("empresa",empresa);
  }

  const { data } = await query;

  dados = data || [];

  montarFiltro();
  montarCalendario();
}

/* ================= FILTRO ================= */

function montarFiltro(){
  const empresas = [...new Set(dados.map(d=>d.empresa))];

  const select = document.getElementById("empresaFiltro");

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option>${e}</option>`).join("");
}

/* ================= CALENDARIO ================= */

function montarCalendario(){

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const diasNoMes = new Date(ano, mes + 1, 0).getDate();

  const mapa = {};

  dados.forEach(d=>{
    const dia = new Date(d.data_recebimento).getDate();
    mapa[dia] = (mapa[dia] || 0) + Number(d.valor);
  });

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    calendar.innerHTML += `
      <div class="day" onclick="abrirDia(${i})">
        <div class="day-number">${i}</div>
        <div class="day-value">
          ${valor > 0 ? "R$ " + valor.toFixed(0) : ""}
        </div>
      </div>
    `;
  }
}

/* ================= MODAL ================= */

function abrirDia(dia){

  const dataSelecionada = new Date(ano, mes, dia)
    .toISOString()
    .split("T")[0];

  const lista = dados.filter(d=>d.data_recebimento === dataSelecionada);

  const agrupado = {};

  lista.forEach(l=>{
    const key = `${l.bandeira} - ${l.modalidade}`;
    agrupado[key] = (agrupado[key] || 0) + Number(l.valor);
  });

  let html = "";

  Object.entries(agrupado).forEach(([k,v])=>{
    html += `
      <div class="item">
        <strong>${k}</strong><br>
        R$ ${v.toFixed(2)}
      </div>
    `;
  });

  if(!html){
    html = "Sem recebimentos";
  }

  document.getElementById("modalData").innerText = dataSelecionada;
  document.getElementById("modalConteudo").innerHTML = html;

  document.getElementById("modal").style.display = "flex";
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
}

/* INIT */
carregar();

</script>

</body>
</html>
