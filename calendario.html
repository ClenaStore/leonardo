<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Agenda de Recebimentos • Mercatto</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

:root{
--bg:#0b0b0b;
--card:#151515;
--border:#242424;
--text:#ffffff;
--muted:#9ca3af;
--gold:#d4af37;
--green:#22c55e;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
padding:16px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
gap:10px;
flex-wrap:wrap;
}

.controls{
display:flex;
gap:8px;
flex-wrap:wrap;
}

select,button{
padding:10px;
border-radius:10px;
border:1px solid var(--border);
background:var(--card);
color:#fff;
cursor:pointer;
}

button{
background:var(--gold);
color:#000;
font-weight:700;
}

/* CALENDARIO */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.weekday{
text-align:center;
font-size:12px;
color:var(--muted);
}

.day{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:8px;
min-height:95px;
cursor:pointer;
transition:.2s;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.day:hover{
transform:scale(1.05);
border-color:var(--gold);
}

.today{
border:1px solid var(--green);
}

.day-number{
font-size:12px;
color:var(--muted);
}

.day-value{
font-size:14px;
font-weight:800;
color:var(--gold);
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.85);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.modal-content{
background:var(--card);
padding:16px;
border-radius:18px;
width:95%;
max-width:420px;
max-height:80vh;
overflow:auto;
}

.item{
border-bottom:1px solid #333;
padding:8px 0;
}

.total-dia{
font-size:18px;
font-weight:800;
color:var(--gold);
margin-bottom:10px;
}

.close{
cursor:pointer;
float:right;
font-size:18px;
}

</style>
</head>

<body>

<div class="header">
<h2>Agenda de Recebimentos</h2>

<div class="controls">
<button onclick="mesAnterior()">←</button>
<button onclick="proximoMes()">→</button>

<select id="empresaFiltro" onchange="carregar()">
<option value="">Todas Empresas</option>
</select>
</div>
</div>

<h3 id="mesLabel"></h3>

<div id="calendar" class="calendar"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<span class="close" onclick="fecharModal()">✕</span>
<h3 id="modalData"></h3>
<div id="modalTotal" class="total-dia"></div>
<div id="modalConteudo"></div>
</div>
</div>

<script>

const { createClient } = supabase;

const sb = createClient(
  "https://dxkszikemntfusfyrzos.supabase.co",
  "sb_publishable_NNFvdfSXgOdGGVcSbphbjQ_brC3_9ed"
);


let dados = [];

let dataAtual = new Date();

/* ===== FORMATAÇÃO BRL ===== */
function moeda(v){
  return Number(v).toLocaleString("pt-BR",{
    style:"currency",
    currency:"BRL"
  });
}

/* ===== CARREGAR ===== */
async function carregar(){

  const empresa = document.getElementById("empresaFiltro").value;

  let query = sb.from("agenda_recebimentos").select("*");

  if(empresa){
    query = query.eq("empresa",empresa);
  }

  const { data } = await query;

  dados = data || [];

  montarFiltro();
  montarCalendario();
}

/* ===== FILTRO ===== */
function montarFiltro(){
  const empresas = [...new Set(dados.map(d=>d.empresa))];

  const select = document.getElementById("empresaFiltro");

  select.innerHTML =
    `<option value="">Todas Empresas</option>` +
    empresas.map(e=>`<option>${e}</option>`).join("");
}

/* ===== CALENDÁRIO ===== */
function montarCalendario(){

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const ano = dataAtual.getFullYear();
  const mes = dataAtual.getMonth();

  document.getElementById("mesLabel").innerText =
    dataAtual.toLocaleDateString("pt-BR",{month:"long",year:"numeric"});

  const primeiroDia = new Date(ano, mes, 1).getDay();
  const diasNoMes = new Date(ano, mes+1, 0).getDate();

  const mapa = {};

  dados.forEach(d=>{
    const dt = new Date(d.data_recebimento);
    if(dt.getMonth() !== mes) return;

    const dia = dt.getDate();
    mapa[dia] = (mapa[dia] || 0) + Number(d.valor);
  });

  const diasSemana = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
  diasSemana.forEach(d=>{
    calendar.innerHTML += `<div class="weekday">${d}</div>`;
  });

  for(let i=0;i<primeiroDia;i++){
    calendar.innerHTML += `<div></div>`;
  }

  const hoje = new Date();

  for(let i=1;i<=diasNoMes;i++){

    const valor = mapa[i] || 0;

    const isHoje =
      i === hoje.getDate() &&
      mes === hoje.getMonth() &&
      ano === hoje.getFullYear();

    calendar.innerHTML += `
      <div class="day ${isHoje ? "today":""}" onclick="abrirDia(${i})">
        <div class="day-number">${i}</div>
        <div class="day-value">
          ${valor ? moeda(valor) : ""}
        </div>
      </div>
    `;
  }
}

/* ===== MODAL ===== */
function abrirDia(dia){

  const ano = dataAtual.getFullYear();
  const mes = dataAtual.getMonth();

  const dataISO = new Date(ano, mes, dia)
    .toISOString()
    .split("T")[0];

  const lista = dados.filter(d=>d.data_recebimento === dataISO);

  let total = 0;

  const agrupado = {};

  lista.forEach(l=>{
    const key = `${l.bandeira} - ${l.modalidade}`;
    agrupado[key] = (agrupado[key] || 0) + Number(l.valor);
    total += Number(l.valor);
  });

  let html = "";

  Object.entries(agrupado).forEach(([k,v])=>{
    html += `
      <div class="item">
        <strong>${k}</strong><br>
        ${moeda(v)}
      </div>
    `;
  });

  document.getElementById("modalData").innerText = dataISO;
  document.getElementById("modalTotal").innerText = moeda(total);
  document.getElementById("modalConteudo").innerHTML =
    html || "Sem recebimentos";

  document.getElementById("modal").style.display = "flex";
}

function fecharModal(){
  document.getElementById("modal").style.display = "none";
}

/* ===== MÊS ===== */
function mesAnterior(){
  dataAtual.setMonth(dataAtual.getMonth()-1);
  montarCalendario();
}

function proximoMes(){
  dataAtual.setMonth(dataAtual.getMonth()+1);
  montarCalendario();
}

/* INIT */
carregar();

</script>

</body>
</html>
